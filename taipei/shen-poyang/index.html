<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>沈伯洋｜2026 市長官方來源觀測站</title>
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../assets/styles.css?v=9cc753beeb">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="candidate" data-base="../../" data-candidate-id="shen-poyang">
  <header class="site-header">
    <a class="brand" href="../../">
      <img class="brand-logo-img" src="../../assets/logo.svg" alt="">
      <span>2026 市長官方來源觀測站</span>
    </a>
    <nav class="site-nav">
      <a href="../../">六都總覽</a>
      <a href="../../spectrum/">議題光譜</a>
      <a href="../../source/">公開來源</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-scrim"></div>
    <div class="hero-content">
      <p class="eyebrow" id="candidate-city">載入中</p>
      <h1 id="candidate-name">載入中...</h1>
      <p class="hero-copy" id="candidate-party"></p>
      <div class="hero-actions" id="candidate-links"></div>
    </div>
  </section>

  <section class="band">
    <div class="band-inner">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Topics</p>
          <h2>議題比例</h2>
        </div>
      </div>
      <div class="topic-breakdown-layout">
        <div class="topic-chart-panel">
          <canvas id="topic-chart"></canvas>
        </div>
        <div class="topic-breakdown" id="topic-breakdown">載入中...</div>
      </div>
    </div>
  </section>

  <section class="band latest-feed-band">
    <div class="band-inner">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Timeline</p>
          <h2>貼文時間軸</h2>
        </div>
        <p class="data-date" id="timeline-count"></p>
      </div>
      <div class="spectrum-controls" id="timeline-filters" hidden>
        <div class="spectrum-control-group">
          <span class="feed-chip-group-label" title="點一下＝只看，再點＝排除，再點＝取消">議題</span>
          <div class="feed-option-chips" id="timeline-topic-chips"></div>
        </div>
        <div class="spectrum-control-group">
          <span class="feed-chip-group-label">關鍵詞</span>
          <div class="feed-option-chips" id="timeline-keyword-chips"></div>
        </div>
      </div>
      <div id="post-list" class="latest-feed-grid">載入中...</div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <div class="footer-brand">
        <span class="footer-title">2026 市長官方來源觀測站</span>
        <p>以公開資料為主的六都市長候選人官方發文索引。非官方認證資料庫。</p>
      </div>
      <div class="footer-links">
        <a href="../../status/">狀態</a>
        <a href="../../feeds/">RSS</a>
        <a href="https://github.com/skyhong2002/mayor2026">GitHub</a>
        <a href="https://github.com/skyhong2002/mayor2026/issues/new/choose">資料回報</a>
      </div>
      <p class="footer-meta">資料來源為候選人公開帳號；貼文著作權屬原作者。MIT License.</p>
    </div>
  </footer>
  <script src="../../assets/app.js?v=9cc753beeb"></script>
</body>
</html>
