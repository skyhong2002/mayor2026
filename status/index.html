<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>狀態｜2026 市長官方來源觀測站</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body data-page="status" data-base="../">
  <header class="site-header">
    <a class="brand" href="../">
      <img class="brand-logo-img" src="../assets/logo.svg" alt="">
      <span>2026 市長官方來源觀測站</span>
    </a>
    <nav class="site-nav">
      <a href="../">六都總覽</a>
      <a href="../source/">公開來源</a>
      <a href="./">狀態</a>
    </nav>
  </header>

  <section class="feed-page-hero">
    <div class="band-inner">
      <p class="eyebrow">Status</p>
      <h1>資料管線狀態</h1>
      <p class="feed-page-summary" id="status-summary">載入中...</p>
    </div>
  </section>

  <section class="band source-band">
    <div class="band-inner">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Metrics</p>
          <h2>收錄統計</h2>
        </div>
      </div>
      <div class="stat-row" id="metric-row" style="margin-top: 0;"></div>

      <div class="section-heading" style="margin-top: 40px;">
        <div>
          <p class="section-kicker">Pipeline</p>
          <h2>最近一次執行</h2>
        </div>
      </div>
      <div class="directory-table-list">
        <table class="score-table source-list-table" id="pipeline-table">
          <thead>
            <tr><th>步驟</th><th>狀態</th><th>開始</th><th>結束</th></tr>
          </thead>
          <tbody><tr><td colspan="4">載入中...</td></tr></tbody>
        </table>
      </div>

      <div class="section-heading" style="margin-top: 40px;">
        <div>
          <p class="section-kicker">Errors</p>
          <h2>近期抓取錯誤</h2>
        </div>
      </div>
      <div class="directory-table-list">
        <table class="score-table source-list-table" id="error-table">
          <thead>
            <tr><th>來源</th><th>訊息</th><th>時間</th></tr>
          </thead>
          <tbody><tr><td colspan="3">載入中...</td></tr></tbody>
        </table>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <div class="footer-brand">
        <span class="footer-title">2026 市長官方來源觀測站</span>
        <p>以公開資料為主的六都市長候選人官方發文索引。非官方認證資料庫。</p>
      </div>
      <div class="footer-links">
        <a href="https://github.com/skyhong2002/mayor2026">GitHub</a>
        <a href="https://github.com/skyhong2002/mayor2026/issues/new/choose">資料回報</a>
      </div>
      <p class="footer-meta">資料來源為候選人公開帳號；貼文著作權屬原作者。MIT License.</p>
    </div>
  </footer>
  <script src="../assets/app.js"></script>
</body>
</html>
